name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - MeuCardapio/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: MeuCardapio/package-lock.json

      - name: Check production API URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Set Settings > Secrets and variables > Actions > Variables > VITE_API_BASE_URL before deploying Pages."
            exit 1
          fi

          case "$VITE_API_BASE_URL" in
            http://localhost*|http://127.0.0.1*)
              echo "VITE_API_BASE_URL must point to the Render API, not localhost."
              exit 1
              ;;
          esac

      - name: Install dependencies
        working-directory: MeuCardapio
        run: npm ci

      - name: Build
        working-directory: MeuCardapio
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: MeuCardapio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
