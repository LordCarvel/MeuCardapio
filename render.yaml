services:
  - type: web
    name: meucardapio-api
    runtime: docker
    plan: free
    dockerfilePath: MeuCardapio/backend/Dockerfile
    dockerContext: MeuCardapio/backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
